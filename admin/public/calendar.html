<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" type="text/css" href="calendar_style.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>101 GreenLight | Booking</title>
  </head>

  <body class="user-bodybook">
    <nav>
      <img src=https://i.imgur.com/H4acstv.png alt="Logo" class="nav-logo">
      <a href="calendar" class="selected">Calendar</a>
      <a href="manage" class="non-selected">Reservation list</a>
    </nav>
    <head>
      <link
        href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
        rel="stylesheet"
      />
      <script src="calendar.js" defer></script>
    </head>
    <body>
      <div class="container">
        <div class="row justify-content-start">
          <div class="col-md-2" style="display: inline">
            <div id="color-legend">
              <div>
                <span
                  class="color-circle"
                  style="background-color: pink"
                ></span>
                Room 1
              </div>
              <div>
                <span
                  class="color-circle"
                  style="background-color: lightblue"
                ></span>
                Room 2
              </div>
              <div>
                <span
                  class="color-circle"
                  style="background-color: lightgreen"
                ></span>
                Room 3
              </div>
              <div>
                <span
                  class="color-circle"
                  style="background-color: lightsalmon"
                ></span>
                Room 4
              </div>

              <div>
                <button id="create-reservation-btn" class="create-reservation">
                  + Create New Reservation
                </button>
              </div>
            </div>
          </div>

          <div class="col-lg-10" style="display: inline">
            <div>
              <div id="calendar-container">
                <div id="calendar-header">
                  <button id="prev-month">&lt;</button>
                  <h2 id="month-year-label"></h2>
                  <button id="next-month">&gt;</button>
                </div>
                <table id="calendar">
                  <tr>
                    <th>Sunday</th>
                    <th>Monday</th>
                    <th>Tuesday</th>
                    <th>Wednesday</th>
                    <th>Thursday</th>
                    <th>Friday</th>
                    <th>Saturday</th>
                  </tr>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Reservation Form (Popup) -->
      <div id="reservation-form-modal" class="modal">
        <div class="modal-content">
          <span class="close">&times;</span>
          <h3>Create a New Reservation</h3>
          <form action="/makeres" id="reservation-form" method="POST">
            <input type="text" id="firstName" placeholder="First Name" required />
            <input type="text" id="lastName" placeholder="Last Name" required />
            <input type="email" id="email" placeholder="Email" required />
            <input  type="text"  id="phoneNumber" placeholder="Phone Number" required />
            <input type="text" id="companyName" placeholder="Company Name" /> 
            <select id="roomSelect" required>
              <option value="" disabled selected>Select a Room</option>
              <option value="pink">Room 1</option>
              <option value="lightblue">Room 2</option>
              <option value="lightgreen">Room 3</option>
              <option value="lightsalmon">Room 4</option>
            </select>
            <input type="text" id="equipment" placeholder="Equipment" />
            <input type="text" id="staff" placeholder="Staff" />
            <input type="date" id="date" placeholder="Date (DD/MM/YYYY)" required/>
            <label for="startTime">Start Time:</label>
            <select id="startTime" required>
            </select>

            <label for="endTime">End Time:</label>
            <select id="endTime" required>
            </select>


            <!-- Submit button -->
            <input type="submit" value="Request Reservation" id="submitbutton" />
          </form>
          <script src="makereservation.js"> </script>
        </div>
      </div>

      <!-- 'More' Button  (Popup) -->
    <div id="reservationsModal" class="reservationsModal">
      <div class="reservationsModalContent">
        <span class="reservationsCloseButton">&times;</span>

        <h2>Reservations for <span id="modalDate"></span></h2>
        <ul id="modalReservationsList"></ul>

      </div>
    </div>
    </body>
  
  </body>
  
</html>
